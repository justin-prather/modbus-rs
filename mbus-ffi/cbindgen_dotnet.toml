language = "C"
include_guard = "MODBUS_RS_DOTNET_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen — DO NOT EDIT.\n   Regenerate with: cargo build -p mbus-ffi --features dotnet,full */"
tab_width = 4
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
no_includes = true

after_includes = """
typedef struct MbusDnTcpClient MbusDnTcpClient;
"""

[parse]
parse_deps = false

[export]
item_types = ["functions", "globals", "typedefs", "opaque", "structs", "enums", "unions", "constants"]
prefix = ""
include = [
    # Status enum (re-exported under the dotnet header for self-contained consumption).
    "MbusStatusCode",
    # All `mbus_dn_*` entry points.
    "mbus_dn_status_str",
    "mbus_dn_tcp_client_new",
    "mbus_dn_tcp_client_free",
    "mbus_dn_tcp_client_connect",
    "mbus_dn_tcp_client_disconnect",
    "mbus_dn_tcp_client_set_request_timeout_ms",
    "mbus_dn_tcp_client_has_pending_requests",
    "mbus_dn_tcp_client_read_holding_registers",
    "mbus_dn_tcp_client_write_single_register",
    "mbus_dn_tcp_client_write_multiple_registers",
    "mbus_dn_tcp_client_handle_size",
]
exclude = [
    # Forward-declared in `after_includes`.
    "MbusDnTcpClient",
    # Gateway / server pool constants leak in from the `c/gateway` and `c/server`
    # modules even when those features are disabled, because cbindgen does not
    # fully honour module-level `#[cfg(feature = ...)]` gates. They are not
    # part of the .NET surface — strip them.
    "MAX_DOWNSTREAM_CHANNELS", "TXN_SIZE", "MAX_UNIT_ROUTES", "MAX_RANGE_ROUTES",
    "MAX_TCP_SERVERS", "MAX_SERIAL_SERVERS", "MAX_GATEWAYS",
    "MBUS_INVALID_GATEWAY_ID", "MBUS_INVALID_SERVER_ID", "MBUS_INVALID_CLIENT_ID",
    "MAX_TCP_CLIENTS", "MAX_SERIAL_CLIENTS",
]

[struct]

[defines]
'feature = "dotnet"' = "MBUS_FEATURE_DOTNET"
'feature = "coils"' = "MBUS_FEATURE_COILS"
'feature = "registers"' = "MBUS_FEATURE_REGISTERS"
'feature = "discrete-inputs"' = "MBUS_FEATURE_DISCRETE_INPUTS"
'cbindgen' = "CBINDGEN"
