language = "C"
include_guard = "MODBUS_RS_CLIENT_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen - DO NOT EDIT */"
tab_width = 4
sys_includes = ["stdint.h", "stdbool.h"]
no_includes = true

after_includes = """
typedef struct MbusCoils MbusCoils;
typedef struct MbusDiscreteInputs MbusDiscreteInputs;
typedef struct MbusFifoQueue MbusFifoQueue;
typedef struct MbusRegisters MbusRegisters;
"""

[parse]
parse_deps = false

[export]
item_types = ["functions", "globals", "typedefs", "opaque", "structs", "enums", "unions", "constants"]
exclude = [
    # Opaque client model types (declared in after_includes as forward-decls)
    "MbusCoils", "MbusDiscreteInputs", "MbusFifoQueue", "MbusRegisters",
    # Server-only: IDs and constants
    "MbusServerId", "MBUS_INVALID_SERVER_ID",
    # Server-only: core types
    "MbusServerExceptionCode", "MbusHookStatus", "MbusServerHandlers", "MbusServerConfig",
    # Server request structs
    "MbusServerReadCoilsReq", "MbusServerReadDiscreteInputsReq",
    "MbusServerReadHoldingRegistersReq", "MbusServerReadInputRegistersReq",
    "MbusServerWriteSingleCoilReq", "MbusServerWriteSingleRegisterReq",
    "MbusServerReadExceptionStatusReq", "MbusServerDiagnosticsReq",
    "MbusServerGetCommEventCounterReq", "MbusServerGetCommEventLogReq",
    "MbusServerWriteMultipleCoilsReq", "MbusServerWriteMultipleRegistersReq",
    "MbusServerReportServerIdReq", "MbusServerReadFileRecordReq",
    "MbusServerWriteFileRecordReq", "MbusServerMaskWriteRegisterReq",
    "MbusServerReadWriteMultipleRegistersReq", "MbusServerReadFifoQueueReq",
    "MbusServerReadDeviceIdentificationReq",
    # Server callback typedefs
    "MbusServerReadCoilsFn", "MbusServerReadDiscreteInputsFn",
    "MbusServerReadHoldingRegistersFn", "MbusServerReadInputRegistersFn",
    "MbusServerWriteSingleCoilFn", "MbusServerWriteSingleRegisterFn",
    "MbusServerReadExceptionStatusFn", "MbusServerDiagnosticsFn",
    "MbusServerGetCommEventCounterFn", "MbusServerGetCommEventLogFn",
    "MbusServerWriteMultipleCoilsFn", "MbusServerWriteMultipleRegistersFn",
    "MbusServerReportServerIdFn", "MbusServerReadFileRecordFn",
    "MbusServerWriteFileRecordFn", "MbusServerMaskWriteRegisterFn",
    "MbusServerReadWriteMultipleRegistersFn", "MbusServerReadFifoQueueFn",
    "MbusServerReadDeviceIdentificationFn",
    # Server lifecycle functions
    "mbus_tcp_server_new", "mbus_tcp_server_free",
    "mbus_tcp_server_connect", "mbus_tcp_server_disconnect",
    "mbus_tcp_server_poll", "mbus_tcp_server_is_connected",
    "mbus_tcp_server_pending_request_count", "mbus_tcp_server_pending_response_count",
    "mbus_serial_server_new", "mbus_serial_server_free",
    "mbus_serial_server_connect", "mbus_serial_server_disconnect",
    "mbus_serial_server_poll", "mbus_serial_server_is_connected",
    "mbus_serial_server_pending_request_count", "mbus_serial_server_pending_response_count",
    # Server lock hooks
    "mbus_server_lock", "mbus_server_unlock",
    # Server gen / app functions
    "mbus_server_model_init", "mbus_server_default_handlers",
    "mbus_gen_on_read_coils", "mbus_gen_on_write_single_coil",
    "mbus_gen_on_write_multiple_coils", "mbus_gen_on_read_discrete_inputs",
    "mbus_gen_on_read_holding_registers", "mbus_gen_on_write_single_register",
    "mbus_gen_on_write_multiple_registers", "mbus_gen_on_read_input_registers",
    "mbus_gen_on_read_input_registers", "mbus_gen_on_read_fifo_queue",
    "mbus_gen_on_read_file_record", "mbus_gen_on_write_file_record",
    "mbus_gen_on_mask_write_register", "mbus_gen_on_read_write_multiple_registers",
    "mbus_gen_on_read_exception_status", "mbus_gen_on_diagnostics",
    "mbus_gen_on_get_comm_event_counter", "mbus_gen_on_get_comm_event_log",
    "mbus_gen_on_report_server_id", "mbus_gen_on_read_device_identification",
    "mbus_server_get_coil", "mbus_server_set_coil",
    "mbus_server_get_discrete_input",
    "mbus_server_get_holding_register", "mbus_server_set_holding_register",
    "mbus_server_get_input_register",
]

[struct]

[defines]
'feature = "c"' = "MBUS_FEATURE_C"
'feature = "c-server"' = "MBUS_FEATURE_C_SERVER"
'feature = "server-traffic"' = "MBUS_FEATURE_SERVER_TRAFFIC"
'feature = "coils"' = "MBUS_FEATURE_COILS"
'feature = "registers"' = "MBUS_FEATURE_REGISTERS"
'feature = "discrete-inputs"' = "MBUS_FEATURE_DISCRETE_INPUTS"
'feature = "fifo"' = "MBUS_FEATURE_FIFO"
'feature = "file-record"' = "MBUS_FEATURE_FILE_RECORD"
'feature = "diagnostics"' = "MBUS_FEATURE_DIAGNOSTICS"
'target_arch = "wasm32"' = "MBUS_TARGET_WASM32"
'cbindgen' = "CBINDGEN"
