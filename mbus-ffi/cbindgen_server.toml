language = "C"
include_guard = "MODBUS_RS_SERVER_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen - DO NOT EDIT */"
tab_width = 4
sys_includes = ["stdint.h", "stdbool.h"]
no_includes = true

[parse]
parse_deps = false

[export]
item_types = ["functions", "globals", "typedefs", "opaque", "structs", "enums", "unions", "constants"]
exclude = [
    # Client-only ID types
    "MbusClientId", "MBUS_INVALID_CLIENT_ID",
    # Client model opaque types
    "MbusCoils", "MbusDiscreteInputs", "MbusFifoQueue", "MbusRegisters",
    # Client config types (not used by server API)
    "MbusSerialConfig", "MbusTcpConfig", "MbusSerialMode", "MbusBackoffStrategy",
    # Client callback context structs
    "MbusReadCoilsCtx", "MbusWriteSingleCoilCtx", "MbusWriteMultipleCoilsCtx",
    "MbusReadHoldingRegistersCtx", "MbusReadInputRegistersCtx",
    "MbusReadWriteMultipleRegistersCtx", "MbusWriteSingleRegisterCtx",
    "MbusWriteMultipleRegistersCtx", "MbusMaskWriteRegisterCtx",
    "MbusReadDiscreteInputsCtx", "MbusReadFifoQueueCtx",
    "MbusFileRecordResult", "MbusReadFileRecordCtx", "MbusWriteFileRecordCtx",
    "MbusReadExceptionStatusCtx", "MbusDiagnosticsCtx",
    "MbusCommEventCounterCtx", "MbusCommEventLogCtx",
    "MbusReportServerIdCtx", "MbusReadDeviceIdCtx", "MbusRequestFailedCtx",
    # Client aggregate types
    "MbusCallbacks", "MbusSubRequest",
    # Client lock hooks
    "mbus_client_lock", "mbus_client_unlock",
    # Client lifecycle functions
    "mbus_tcp_client_new", "mbus_tcp_client_free",
    "mbus_tcp_connect", "mbus_tcp_disconnect", "mbus_tcp_poll",
    "mbus_tcp_is_connected", "mbus_tcp_has_pending_requests", "mbus_tcp_reconnect",
    "mbus_serial_client_new", "mbus_serial_client_free",
    "mbus_serial_connect", "mbus_serial_disconnect", "mbus_serial_poll",
    "mbus_serial_is_connected", "mbus_serial_has_pending_requests", "mbus_serial_reconnect",
    # Client request functions
    "mbus_tcp_read_coils", "mbus_tcp_read_discrete_inputs",
    "mbus_tcp_read_single_coil", "mbus_tcp_read_single_discrete_input",
    "mbus_tcp_write_single_coil", "mbus_tcp_write_multiple_coils", "mbus_tcp_write_multiple_registers",
    "mbus_tcp_read_fifo_queue", "mbus_tcp_read_file_record", "mbus_tcp_write_file_record",
    "mbus_tcp_read_write_multiple_registers", "mbus_tcp_diagnostics",
    "mbus_tcp_read_device_identification",
    "mbus_serial_read_coils", "mbus_serial_read_discrete_inputs",
    "mbus_serial_read_single_coil", "mbus_serial_read_single_discrete_input",
    "mbus_serial_write_single_coil", "mbus_serial_write_multiple_coils",
    "mbus_serial_write_multiple_registers",
    "mbus_serial_read_fifo_queue", "mbus_serial_read_file_record", "mbus_serial_write_file_record",
    "mbus_serial_read_write_multiple_registers", "mbus_serial_diagnostics",
    "mbus_serial_read_device_identification",
    # Client model functions
    "mbus_coils_from_address", "mbus_coils_quantity", "mbus_coils_value",
    "mbus_coils_value_at_index", "mbus_coils_values_ptr",
    "mbus_registers_from_address", "mbus_registers_quantity", "mbus_registers_value",
    "mbus_registers_value_at_index", "mbus_registers_values_ptr",
    "mbus_discrete_inputs_from_address", "mbus_discrete_inputs_quantity",
    "mbus_discrete_inputs_value", "mbus_discrete_inputs_value_at_index",
    "mbus_discrete_inputs_values_ptr",
    "mbus_fifo_queue_count", "mbus_fifo_queue_value", "mbus_fifo_queue_values_ptr",
    "mbus_fifo_queue_ptr_address",
]
include = [
    "MbusServerExceptionCode",
    "MbusServerHandlers",
    "MbusServerConfig",
    "MbusServerId",
    "MBUS_INVALID_SERVER_ID",
    # Request structs
    "MbusServerReadCoilsReq",
    "MbusServerReadDiscreteInputsReq",
    "MbusServerReadHoldingRegistersReq",
    "MbusServerReadInputRegistersReq",
    "MbusServerWriteSingleCoilReq",
    "MbusServerWriteSingleRegisterReq",
    "MbusServerReadExceptionStatusReq",
    "MbusServerDiagnosticsReq",
    "MbusServerGetCommEventCounterReq",
    "MbusServerGetCommEventLogReq",
    "MbusServerWriteMultipleCoilsReq",
    "MbusServerWriteMultipleRegistersReq",
    "MbusServerReportServerIdReq",
    "MbusServerReadFileRecordReq",
    "MbusServerWriteFileRecordReq",
    "MbusServerMaskWriteRegisterReq",
    "MbusServerReadWriteMultipleRegistersReq",
    "MbusServerReadFifoQueueReq",
    "MbusServerReadDeviceIdentificationReq",
    # Callback typedefs
    "MbusServerReadCoilsFn",
    "MbusServerReadDiscreteInputsFn",
    "MbusServerReadHoldingRegistersFn",
    "MbusServerReadInputRegistersFn",
    "MbusServerWriteSingleCoilFn",
    "MbusServerWriteSingleRegisterFn",
    "MbusServerReadExceptionStatusFn",
    "MbusServerDiagnosticsFn",
    "MbusServerGetCommEventCounterFn",
    "MbusServerGetCommEventLogFn",
    "MbusServerWriteMultipleCoilsFn",
    "MbusServerWriteMultipleRegistersFn",
    "MbusServerReportServerIdFn",
    "MbusServerReadFileRecordFn",
    "MbusServerWriteFileRecordFn",
    "MbusServerMaskWriteRegisterFn",
    "MbusServerReadWriteMultipleRegistersFn",
    "MbusServerReadFifoQueueFn",
    "MbusServerReadDeviceIdentificationFn",
    # Server lifecycle functions
    "mbus_tcp_server_new",
    "mbus_tcp_server_free",
    "mbus_tcp_server_connect",
    "mbus_tcp_server_disconnect",
    "mbus_tcp_server_poll",
    "mbus_tcp_server_is_connected",
    "mbus_tcp_server_pending_request_count",
    "mbus_tcp_server_pending_response_count",
    "mbus_serial_server_new",
    "mbus_serial_server_free",
    "mbus_serial_server_connect",
    "mbus_serial_server_disconnect",
    "mbus_serial_server_poll",
    "mbus_serial_server_is_connected",
    "mbus_serial_server_pending_request_count",
    "mbus_serial_server_pending_response_count",
    # Transport callbacks (shared, needed by server)
    "MbusTransportCallbacks",
    # Lock hooks the C application must provide
    "mbus_pool_lock",
    "mbus_pool_unlock",
    "mbus_server_lock",
    "mbus_server_unlock",
]

[struct]

[defines]
'feature = "c-server"' = "MBUS_FEATURE_C_SERVER"
'cbindgen' = "CBINDGEN"
