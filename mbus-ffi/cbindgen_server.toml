language = "C"
include_guard = "MBUS_FFI_SERVER_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen - DO NOT EDIT */"
tab_width = 4
sys_includes = ["stdint.h", "stdbool.h"]
no_includes = true

[parse]
parse_deps = false

[export]
item_types = ["functions", "globals", "typedefs", "opaque", "structs", "enums", "unions", "constants"]
include = [
    "MbusServerExceptionCode",
    "MbusServerHandlers",
    "MbusServerConfig",
    "MbusServerId",
    "MBUS_INVALID_SERVER_ID",
    # Request structs
    "MbusServerReadCoilsReq",
    "MbusServerReadDiscreteInputsReq",
    "MbusServerReadHoldingRegistersReq",
    "MbusServerReadInputRegistersReq",
    "MbusServerWriteSingleCoilReq",
    "MbusServerWriteSingleRegisterReq",
    "MbusServerReadExceptionStatusReq",
    "MbusServerDiagnosticsReq",
    "MbusServerGetCommEventCounterReq",
    "MbusServerGetCommEventLogReq",
    "MbusServerWriteMultipleCoilsReq",
    "MbusServerWriteMultipleRegistersReq",
    "MbusServerReportServerIdReq",
    "MbusServerReadFileRecordReq",
    "MbusServerWriteFileRecordReq",
    "MbusServerMaskWriteRegisterReq",
    "MbusServerReadWriteMultipleRegistersReq",
    "MbusServerReadFifoQueueReq",
    "MbusServerReadDeviceIdentificationReq",
    # Callback typedefs
    "MbusServerReadCoilsFn",
    "MbusServerReadDiscreteInputsFn",
    "MbusServerReadHoldingRegistersFn",
    "MbusServerReadInputRegistersFn",
    "MbusServerWriteSingleCoilFn",
    "MbusServerWriteSingleRegisterFn",
    "MbusServerReadExceptionStatusFn",
    "MbusServerDiagnosticsFn",
    "MbusServerGetCommEventCounterFn",
    "MbusServerGetCommEventLogFn",
    "MbusServerWriteMultipleCoilsFn",
    "MbusServerWriteMultipleRegistersFn",
    "MbusServerReportServerIdFn",
    "MbusServerReadFileRecordFn",
    "MbusServerWriteFileRecordFn",
    "MbusServerMaskWriteRegisterFn",
    "MbusServerReadWriteMultipleRegistersFn",
    "MbusServerReadFifoQueueFn",
    "MbusServerReadDeviceIdentificationFn",
    # Server lifecycle functions
    "mbus_tcp_server_new",
    "mbus_tcp_server_free",
    "mbus_tcp_server_connect",
    "mbus_tcp_server_disconnect",
    "mbus_tcp_server_poll",
    "mbus_tcp_server_is_connected",
    "mbus_tcp_server_pending_request_count",
    "mbus_tcp_server_pending_response_count",
    "mbus_serial_server_new",
    "mbus_serial_server_free",
    "mbus_serial_server_connect",
    "mbus_serial_server_disconnect",
    "mbus_serial_server_poll",
    "mbus_serial_server_is_connected",
    "mbus_serial_server_pending_request_count",
    "mbus_serial_server_pending_response_count",
    # Transport callbacks (reused from client)
    "MbusTransportCallbacks",
]

[struct]

[defines]
'feature = "c-server"' = "MBUS_FEATURE_C_SERVER"
'cbindgen' = "CBINDGEN"
