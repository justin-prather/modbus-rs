language = "C"
include_guard = "MODBUS_RS_GATEWAY_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen - DO NOT EDIT */"
header = """
/*
 * The cbindgen pass picks up declarations from the c/c-server modules whenever
 * those features are enabled in the same build. Forward declarations below
 * keep the gateway header self-contained for consumers who only call the
 * gateway API. Do NOT call the leaked client/server functions through this
 * header — include modbus_rs_client.h / modbus_rs_server.h instead.
 */
typedef struct Coils Coils;
typedef struct DiscreteInputs DiscreteInputs;
typedef struct FifoQueue FifoQueue;
typedef struct Registers Registers;
typedef struct MbusCoils MbusCoils;
typedef struct MbusDiscreteInputs MbusDiscreteInputs;
typedef struct MbusFifoQueue MbusFifoQueue;
typedef struct MbusRegisters MbusRegisters;
typedef uint16_t MbusClientId;
typedef uint16_t MbusServerId;
"""
tab_width = 4
sys_includes = ["stdint.h", "stdbool.h"]
no_includes = true

[parse]
parse_deps = false

[export]
item_types = ["functions", "globals", "typedefs", "opaque", "structs", "enums", "unions", "constants"]
# The gateway header should NOT leak unrelated client/server types. The c-gateway
# module re-uses MbusTransportCallbacks (transport.rs) and MbusStatusCode
# (error.rs) but everything else from the c/ and c_server/ modules — including
# the server-side opaque data wrappers and codegen items — must be excluded.
exclude = [
    "MbusCoils",
    "MbusDiscreteInputs",
    "MbusFifoQueue",
    "MbusRegisters",
    "MbusServerExceptionCode",
    "MbusServerId",
    "MbusClientId",
    "MbusSerialConfig",
    "MbusTcpConfig",
    "MbusSerialMode",
    "MBUS_INVALID_CLIENT_ID",
    "MBUS_INVALID_SERVER_ID",
    "mbus_serial_client_new",
    "mbus_tcp_client_new",
    "mbus_tcp_server_new",
    "mbus_serial_rtu_server_new",
    "mbus_serial_ascii_server_new",
    "mbus_client_free",
    "mbus_server_free",
    "mbus_server_poll",
]

[defines]
"feature = c-client" = "MBUS_FEATURE_C_CLIENT"
"feature = c-server" = "MBUS_FEATURE_C_SERVER"
"feature = c-gateway" = "MBUS_FEATURE_C_GATEWAY"
"feature = coils" = "MBUS_FEATURE_COILS"
"feature = holding-registers" = "MBUS_FEATURE_HOLDING_REGISTERS"
"feature = input-registers" = "MBUS_FEATURE_INPUT_REGISTERS"
"feature = discrete-inputs" = "MBUS_FEATURE_DISCRETE_INPUTS"
"feature = fifo" = "MBUS_FEATURE_FIFO"
"feature = file-record" = "MBUS_FEATURE_FILE_RECORD"
"feature = diagnostics" = "MBUS_FEATURE_DIAGNOSTICS"
"feature = traffic" = "MBUS_FEATURE_TRAFFIC"
"feature = server-traffic" = "MBUS_FEATURE_SERVER_TRAFFIC"
"feature = network-tcp" = "MBUS_FEATURE_NETWORK_TCP"
"feature = serial-rtu" = "MBUS_FEATURE_SERIAL_RTU"
"feature = serial-ascii" = "MBUS_FEATURE_SERIAL_ASCII"
"target_arch = wasm32" = "MBUS_TARGET_WASM32"
"cbindgen" = "CBINDGEN"
