language = "C"
include_guard = "MODBUS_RS_GO_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen — DO NOT EDIT.\n   Regenerate with: cargo build -p mbus-ffi --features go,full */"
tab_width = 4
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
no_includes = true

after_includes = """
typedef struct MbusGoTcpClient MbusGoTcpClient;
typedef struct MbusGoSerialClient MbusGoSerialClient;
typedef struct MbusGoTcpServer MbusGoTcpServer;
typedef struct MbusGoTcpGateway MbusGoTcpGateway;

/* Forward declarations for sibling-binding types that cbindgen leaks
   into this header even though their cfgs are disabled.  They are not
   reachable from the Go ABI; the typedefs make the header
   self-consistent so cgo can compile it cleanly. */
typedef struct MbusCoils MbusCoils;
typedef struct MbusDiscreteInputs MbusDiscreteInputs;
typedef struct MbusFifoQueue MbusFifoQueue;
typedef struct MbusRegisters MbusRegisters;
typedef uint16_t MbusClientId;
typedef uint16_t MbusServerId;
typedef uint16_t MbusGatewayId;
"""

[parse]
parse_deps = false

[export]
item_types = ["functions", "globals", "typedefs", "opaque", "structs", "enums", "unions", "constants"]
prefix = ""
include = [
    # Status enum (re-exported under the Go header for self-contained consumption).
    "MbusStatusCode",
    # Server vtable (struct of function pointers passed by the Go binding).
    "MbusGoServerVtable",
    # All `mbus_go_*` entry points.
    "mbus_go_status_str",
    # ── TCP client ─────────────────────────────────────────────────────────
    "mbus_go_tcp_client_new",
    "mbus_go_tcp_client_free",
    "mbus_go_tcp_client_connect",
    "mbus_go_tcp_client_disconnect",
    "mbus_go_tcp_client_set_request_timeout_ms",
    "mbus_go_tcp_client_has_pending_requests",
    "mbus_go_tcp_client_handle_size",
    "mbus_go_tcp_client_read_holding_registers",
    "mbus_go_tcp_client_read_input_registers",
    "mbus_go_tcp_client_write_single_register",
    "mbus_go_tcp_client_write_multiple_registers",
    "mbus_go_tcp_client_mask_write_register",
    "mbus_go_tcp_client_read_write_multiple_registers",
    "mbus_go_tcp_client_read_coils",
    "mbus_go_tcp_client_write_single_coil",
    "mbus_go_tcp_client_write_multiple_coils",
    "mbus_go_tcp_client_read_discrete_inputs",
    "mbus_go_tcp_client_read_fifo_queue",
    "mbus_go_tcp_client_read_exception_status",
    "mbus_go_tcp_client_get_comm_event_counter",
    "mbus_go_tcp_client_get_comm_event_log",
    "mbus_go_tcp_client_report_server_id",
    "mbus_go_tcp_client_diagnostics",
    "mbus_go_tcp_client_read_file_record",
    "mbus_go_tcp_client_write_file_record",
    # ── Serial client ──────────────────────────────────────────────────────
    "mbus_go_serial_client_new_rtu",
    "mbus_go_serial_client_new_ascii",
    "mbus_go_serial_client_free",
    "mbus_go_serial_client_connect",
    "mbus_go_serial_client_disconnect",
    "mbus_go_serial_client_set_request_timeout_ms",
    "mbus_go_serial_client_read_holding_registers",
    "mbus_go_serial_client_read_input_registers",
    "mbus_go_serial_client_write_single_register",
    "mbus_go_serial_client_write_multiple_registers",
    "mbus_go_serial_client_mask_write_register",
    "mbus_go_serial_client_read_write_multiple_registers",
    "mbus_go_serial_client_read_coils",
    "mbus_go_serial_client_write_single_coil",
    "mbus_go_serial_client_write_multiple_coils",
    "mbus_go_serial_client_read_discrete_inputs",
    "mbus_go_serial_client_read_fifo_queue",
    "mbus_go_serial_client_read_exception_status",
    "mbus_go_serial_client_get_comm_event_counter",
    "mbus_go_serial_client_get_comm_event_log",
    "mbus_go_serial_client_report_server_id",
    "mbus_go_serial_client_diagnostics",
    "mbus_go_serial_client_read_file_record",
    "mbus_go_serial_client_write_file_record",
    # ── TCP server ─────────────────────────────────────────────────────────
    "mbus_go_tcp_server_new",
    "mbus_go_tcp_server_free",
    "mbus_go_tcp_server_start",
    "mbus_go_tcp_server_stop",
    # ── TCP gateway ────────────────────────────────────────────────────────
    "mbus_go_tcp_gateway_new",
    "mbus_go_tcp_gateway_free",
    "mbus_go_tcp_gateway_add_downstream",
    "mbus_go_tcp_gateway_add_unit_route",
    "mbus_go_tcp_gateway_add_range_route",
    "mbus_go_tcp_gateway_start",
    "mbus_go_tcp_gateway_stop",
]
exclude = [
    # Forward-declared in `after_includes`.
    "MbusGoTcpClient",
    "MbusGoSerialClient",
    "MbusGoTcpServer",
    "MbusGoTcpGateway",
    # Pool / gateway constants leaking from `c/gateway` and `c/server` modules
    # even when those features are disabled, because cbindgen does not fully
    # honour module-level `#[cfg(feature = ...)]` gates. Strip them — they are
    # not part of the Go surface.
    "MAX_DOWNSTREAM_CHANNELS", "TXN_SIZE", "MAX_UNIT_ROUTES", "MAX_RANGE_ROUTES",
    "MAX_TCP_SERVERS", "MAX_SERIAL_SERVERS", "MAX_GATEWAYS",
    "MBUS_INVALID_GATEWAY_ID", "MBUS_INVALID_SERVER_ID", "MBUS_INVALID_CLIENT_ID",
    "MAX_TCP_CLIENTS", "MAX_SERIAL_CLIENTS",
    # cbindgen leaks types from sibling bindings (c, dotnet) and from
    # internal Rust models even though their cfgs are disabled. They are
    # unreachable from the Go ABI surface — exclude them so the header
    # compiles cleanly under cgo.
    "MbusDnTcpClient", "MbusDnTcpServer", "MbusDnTcpGateway", "MbusDnStatus",
    "MbusDnServerVtable",
    "MbusCoils", "MbusDiscreteInputs", "MbusFifoQueue", "MbusRegisters",
    "Coils", "DiscreteInputs", "FifoQueue", "Registers",
    "MbusClientId", "MbusServerId", "MbusGatewayId",
    "MbusCallbacks", "MbusServerCallbacks", "MbusGatewayCallbacks",
    "MbusServerVtable", "MbusGatewayConfig",
    # Constants from the c/dotnet vtables that don't apply to Go.
    "VTABLE_BUF_BYTES", "VTABLE_BUF_WORDS",
]

[struct]

[defines]
'feature = "go"' = "MBUS_FEATURE_GO"
'feature = "coils"' = "MBUS_FEATURE_COILS"
'feature = "registers"' = "MBUS_FEATURE_REGISTERS"
'feature = "discrete-inputs"' = "MBUS_FEATURE_DISCRETE_INPUTS"
'feature = "fifo"' = "MBUS_FEATURE_FIFO"
'feature = "file-record"' = "MBUS_FEATURE_FILE_RECORD"
'feature = "diagnostics"' = "MBUS_FEATURE_DIAGNOSTICS"
'cbindgen' = "CBINDGEN"
