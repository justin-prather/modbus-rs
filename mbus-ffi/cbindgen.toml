language = "C"
autogen_warning = "/* Auto-generated by cbindgen - DO NOT EDIT */"
include_guard = "MODBUS_RS_H"
pragma_once = true
tab_width = 4
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
no_includes = true

after_includes = """
/* Common forward declarations */
#if defined(MBUS_FEATURE_COILS)
typedef struct MbusCoils MbusCoils;
#endif

#if defined(MBUS_FEATURE_DISCRETE_INPUTS)
typedef struct MbusDiscreteInputs MbusDiscreteInputs;
#endif

#if defined(MBUS_FEATURE_FIFO)
typedef struct MbusFifoQueue MbusFifoQueue;
#endif

#if defined(MBUS_FEATURE_HOLDING_REGISTERS) || defined(MBUS_FEATURE_INPUT_REGISTERS)
typedef struct MbusRegisters MbusRegisters;
#endif

#if defined(MBUS_FEATURE_HOLDING_REGISTERS)
typedef struct MbusHoldingRegisters MbusHoldingRegisters;
#endif

#if defined(MBUS_FEATURE_INPUT_REGISTERS)
typedef struct MbusInputRegisters MbusInputRegisters;
#endif

#if defined(MBUS_FEATURE_DOTNET)
typedef struct MbusDnTcpClient MbusDnTcpClient;
#endif

#if defined(MBUS_FEATURE_GO)
typedef struct MbusGoTcpClient MbusGoTcpClient;
typedef struct MbusGoSerialClient MbusGoSerialClient;
typedef struct MbusGoTcpServer MbusGoTcpServer;
typedef struct MbusGoTcpGateway MbusGoTcpGateway;

/* Go server vtable manually defined because cbindgen doesn't handle conditional fields correctly */
typedef struct MbusGoServerVtable {
    void *ctx;
    int32_t (*read_coils)(void*, uint16_t, uint16_t, uint8_t*, uint16_t*);
    int32_t (*write_single_coil)(void*, uint16_t, uint8_t);
    int32_t (*write_multiple_coils)(void*, uint16_t, const uint8_t*, uint16_t, uint16_t);
    int32_t (*read_discrete_inputs)(void*, uint16_t, uint16_t, uint8_t*, uint16_t*);
    int32_t (*read_holding_registers)(void*, uint16_t, uint16_t, uint16_t*, uint16_t*);
    int32_t (*read_input_registers)(void*, uint16_t, uint16_t, uint16_t*, uint16_t*);
    int32_t (*write_single_register)(void*, uint16_t, uint16_t);
    int32_t (*write_multiple_registers)(void*, uint16_t, const uint8_t*, uint16_t);
    int32_t (*mask_write_register)(void*, uint16_t, uint16_t, uint16_t);
    int32_t (*read_write_multiple_registers)(void*, uint16_t, uint16_t, uint16_t, const uint16_t*, uint16_t*);
    int32_t (*read_fifo_queue)(void*, uint16_t, uint16_t*, uint16_t*);
    int32_t (*read_file_record)(void*, uint16_t, uint16_t, uint16_t, uint16_t*, uint16_t*);
    int32_t (*write_file_record)(void*, uint16_t, uint16_t, uint16_t, const uint16_t*);
    int32_t (*read_exception_status)(void*, uint8_t*);
    int32_t (*diagnostics)(void*, uint16_t, uint16_t, uint16_t*, uint16_t*);
    int32_t (*get_comm_event_counter)(void*, uint16_t*, uint16_t*);
    int32_t (*get_comm_event_log)(void*, uint8_t*, uint16_t*);
    int32_t (*report_server_id)(void*, uint8_t*, uint16_t*);
} MbusGoServerVtable;
#endif
"""

[parse]
parse_deps = false

[export]
item_types = [
    "functions",
    "globals",
    "typedefs",
    "opaque",
    "structs",
    "enums",
    "unions",
    "constants",
]
exclude = [
    # Opaque client model types (declared in after_includes as forward-decls)
    "MbusCoils",
    "MbusDiscreteInputs",
    "MbusFifoQueue",
    "MbusRegisters",
    "MbusHoldingRegisters",
    "MbusInputRegisters",
    # Manually defined in after_includes
    "MbusGoServerVtable",
]

[struct]

[defines]
"feature = c-client" = "MBUS_FEATURE_C_CLIENT"
"feature = c-server" = "MBUS_FEATURE_C_SERVER"
"feature = c-gateway" = "MBUS_FEATURE_C_GATEWAY"
"feature = coils" = "MBUS_FEATURE_COILS"
"feature = holding-registers" = "MBUS_FEATURE_HOLDING_REGISTERS"
"feature = input-registers" = "MBUS_FEATURE_INPUT_REGISTERS"
"feature = discrete-inputs" = "MBUS_FEATURE_DISCRETE_INPUTS"
"feature = fifo" = "MBUS_FEATURE_FIFO"
"feature = file-record" = "MBUS_FEATURE_FILE_RECORD"
"feature = diagnostics" = "MBUS_FEATURE_DIAGNOSTICS"
"feature = traffic" = "MBUS_FEATURE_TRAFFIC"
"feature = server-traffic" = "MBUS_FEATURE_SERVER_TRAFFIC"
"feature = network-tcp" = "MBUS_FEATURE_NETWORK_TCP"
"feature = serial-rtu" = "MBUS_FEATURE_SERIAL_RTU"
"feature = serial-ascii" = "MBUS_FEATURE_SERIAL_ASCII"
"feature = dotnet" = "MBUS_FEATURE_DOTNET"
"feature = go" = "MBUS_FEATURE_GO"
"target_arch = wasm32" = "MBUS_TARGET_WASM32"
"cbindgen" = "CBINDGEN"
