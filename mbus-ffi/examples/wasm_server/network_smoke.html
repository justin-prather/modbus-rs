<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mbus-ffi WASM TCP Server Smoke</title>
  <style>
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.4;
      background: #1f2937;
      color: #f3f4f6;
    }
    .row { margin: 0.6rem 0; }
    label { display: inline-block; min-width: 220px; }
    input, textarea {
      width: 360px;
      max-width: 100%;
      padding: 0.35rem;
      background: #374151;
      color: #f3f4f6;
      border: 1px solid #6b7280;
    }
    textarea {
      min-height: 120px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    button {
      margin-right: 0.5rem;
      margin-bottom: 0.4rem;
      padding: 0.45rem 0.8rem;
      background: #334155;
      color: #f3f4f6;
      border: 1px solid #9ca3af;
      cursor: pointer;
    }
    pre {
      border: 1px solid #4b5563;
      border-radius: 6px;
      background: #111827;
      padding: 0.8rem;
      min-height: 220px;
      white-space: pre-wrap;
    }
    .hint { color: #d1d5db; }
  </style>
</head>
<body>
  <h1>mbus-ffi WASM TCP Server Smoke</h1>

  <p class="hint">
    Build package first in <code>mbus-ffi</code>:
    <br />
    <code>wasm-pack build --target web --features wasm,full</code>
  </p>
  <div class="row">
    <label for="wsUrl">Gateway WebSocket URL</label>
    <input id="wsUrl" value="ws://127.0.0.1:8081" />
  </div>

  <div class="row">
    <label for="requestJson">Dispatch Request JSON</label>
    <textarea id="requestJson">{"kind":"readHoldingRegisters","unit_id":1,"address":0,"quantity":2}</textarea>
  </div>

  <div class="row">
    <label for="frameHex">Frame Hex (send_frame)</label>
    <input id="frameHex" value="AA55" />
  </div>

  <div class="row">
    <button id="btnCreate">Create Server</button>
    <button id="btnStart">Start</button>
    <button id="btnStop">Stop</button>
    <button id="btnStatus">Status</button>
    <button id="btnDispatch">Dispatch Request</button>
    <button id="btnSend">Send Frame</button>
    <button id="btnRecv">Recv Frame</button>
    <button id="btnRunAll">Run Full Smoke</button>
    <button id="btnClear">Clear Log</button>
  </div>

  <h3>Log</h3>
  <pre id="log"></pre>

  <script type="module">
    import init, { WasmTcpGatewayConfig, WasmTcpServer } from "../../pkg/mbus_ffi.js";

    const logEl = document.getElementById("log");
    const log = (msg) => {
      const ts = new Date().toISOString().slice(11, 23);
      logEl.textContent += `[${ts}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    };

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const parseJson = (text) => {
      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error(`Invalid JSON: ${String(e)}`);
      }
    };

    const hexToBytes = (hexRaw) => {
      const hex = hexRaw.replace(/\s+/g, "").toLowerCase();
      if (!hex.length) return new Uint8Array(0);
      if (hex.length % 2 !== 0) throw new Error("Hex length must be even");
      const out = new Uint8Array(hex.length / 2);
      for (let i = 0; i < out.length; i += 1) {
        const byte = Number.parseInt(hex.slice(i * 2, i * 2 + 2), 16);
        if (Number.isNaN(byte)) throw new Error("Invalid hex byte");
        out[i] = byte;
      }
      return out;
    };

    const formatValue = (value) => {
      if (value == null) return String(value);
      if (ArrayBuffer.isView(value)) return JSON.stringify(Array.from(value));
      if (typeof value === "object") return JSON.stringify(value);
      return String(value);
    };

    const toU8 = (value) => {
      if (value instanceof Uint8Array) return value;
      if (Array.isArray(value)) return Uint8Array.from(value);
      if (value && typeof value.length === "number") return Uint8Array.from(value);
      return new Uint8Array(0);
    };

    const u16 = (hi, lo) => ((hi << 8) | lo) & 0xffff;
    const hi = (v) => (v >> 8) & 0xff;
    const lo = (v) => v & 0xff;

    const buildTcpAdu = (txHi, txLo, prHi, prLo, unit, pdu) => {
      const pduBytes = toU8(pdu);
      const mbapLen = pduBytes.length + 1; // unit + pdu
      const out = new Uint8Array(7 + pduBytes.length);
      out[0] = txHi;
      out[1] = txLo;
      out[2] = prHi;
      out[3] = prLo;
      out[4] = hi(mbapLen);
      out[5] = lo(mbapLen);
      out[6] = unit;
      out.set(pduBytes, 7);
      return out;
    };

    const exception = (txHi, txLo, prHi, prLo, unit, fc, code) =>
      buildTcpAdu(txHi, txLo, prHi, prLo, unit, [fc | 0x80, code]);

    const readBitsResponse = (fc, startAddr, qty) => {
      const byteCount = Math.ceil(qty / 8);
      const data = new Uint8Array(byteCount);
      for (let i = 0; i < qty; i += 1) {
        const bit = ((startAddr + i) & 1) === 0 ? 1 : 0;
        if (bit) data[i >> 3] |= 1 << (i & 7);
      }
      return Uint8Array.from([fc, byteCount, ...data]);
    };

    const readRegsResponse = (fc, startAddr, qty) => {
      const byteCount = qty * 2;
      const out = new Uint8Array(2 + byteCount);
      out[0] = fc;
      out[1] = byteCount;
      for (let i = 0; i < qty; i += 1) {
        const value = (startAddr + i) & 0xffff;
        out[2 + i * 2] = hi(value);
        out[3 + i * 2] = lo(value);
      }
      return out;
    };

    const buildAutoResponse = (frame) => {
      // Modbus TCP ADU: [tx_hi tx_lo pr_hi pr_lo len_hi len_lo unit pdu...]
      if (frame.length < 8) {
        throw new Error(`frame too short (${frame.length})`);
      }
      const txHi = frame[0];
      const txLo = frame[1];
      const prHi = frame[2];
      const prLo = frame[3];
      const unit = frame[6];
      const fc = frame[7];

      const mbapLen = u16(frame[4], frame[5]);
      const pduLen = Math.max(0, mbapLen - 1);
      const reqPdu = frame.slice(7, 7 + pduLen);

      switch (fc) {
        case 0x01: {
          const startAddr = u16(frame[8], frame[9]);
          const qty = u16(frame[10], frame[11]);
          if (qty < 1 || qty > 2000) return exception(txHi, txLo, prHi, prLo, unit, fc, 0x03);
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, readBitsResponse(0x01, startAddr, qty));
        }
        case 0x02: {
          const startAddr = u16(frame[8], frame[9]);
          const qty = u16(frame[10], frame[11]);
          if (qty < 1 || qty > 2000) return exception(txHi, txLo, prHi, prLo, unit, fc, 0x03);
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, readBitsResponse(0x02, startAddr, qty));
        }
        case 0x03:
        case 0x04: {
          const startAddr = u16(frame[8], frame[9]);
          const qty = u16(frame[10], frame[11]);
          if (qty < 1 || qty > 125) return exception(txHi, txLo, prHi, prLo, unit, fc, 0x03);
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, readRegsResponse(fc, startAddr, qty));
        }
        case 0x05:
        case 0x06:
          // Echo write-single request PDU
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, reqPdu);
        case 0x0f:
        case 0x10: {
          // Ack with start address + quantity
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, [fc, frame[8], frame[9], frame[10], frame[11]]);
        }
        case 0x16:
          // Mask write register response echoes address and masks.
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, [0x16, frame[8], frame[9], frame[10], frame[11], frame[12], frame[13]]);
        case 0x17: {
          const readAddr = u16(frame[8], frame[9]);
          const readQty = u16(frame[10], frame[11]);
          if (readQty < 1 || readQty > 125) return exception(txHi, txLo, prHi, prLo, unit, fc, 0x03);
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, readRegsResponse(0x17, readAddr, readQty));
        }
        case 0x18: {
          const fifoCount = 3;
          const fifoByteCount = 2 + fifoCount * 2;
          const pdu = [
            0x18,
            hi(fifoByteCount), lo(fifoByteCount),
            hi(fifoCount), lo(fifoCount),
            0x00, 0x11,
            0x00, 0x22,
            0x00, 0x33,
          ];
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, pdu);
        }
        case 0x14: {
          const recLen = frame.length >= 16 ? u16(frame[14], frame[15]) : 1;
          const safeRecLen = Math.max(1, Math.min(recLen, 16));
          const dataBytes = [];
          for (let i = 0; i < safeRecLen; i += 1) {
            const v = (0x0100 + i) & 0xffff;
            dataBytes.push(hi(v), lo(v));
          }
          const subRespLen = 1 + dataBytes.length; // ref_type + data bytes
          const respByteCount = 1 + subRespLen;
          const pdu = [0x14, respByteCount, subRespLen, 0x06, ...dataBytes];
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, pdu);
        }
        case 0x15:
          // write file record acknowledgement echoes request PDU
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, reqPdu);
        case 0x07:
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, [0x07, 0x00]);
        case 0x08:
          // Diagnostics response echoes request PDU
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, reqPdu);
        case 0x0b:
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, [0x0b, 0x00, 0x00, 0x00, 0x05]);
        case 0x0c:
          // byte_count=10 => status(2)+event_count(2)+message_count(2)+events(4)
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, [0x0c, 0x0a, 0x00, 0x00, 0x00, 0x05, 0x00, 0x07, 0x11, 0x22, 0x33, 0x44]);
        case 0x11:
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, [0x11, 0x03, 0x42, 0xff, 0x01]);
        case 0x2b: {
          // FC43 / MEI 0x0E Read Device Identification
          const meiType = frame[8] ?? 0x0e;
          if (meiType !== 0x0e) return exception(txHi, txLo, prHi, prLo, unit, fc, 0x01);
          const readCode = frame[9] ?? 0x01;
          const objects = [
            0x00, 0x04, 0x6d, 0x62, 0x75, 0x73, // object 0 = "mbus"
            0x01, 0x05, 0x73, 0x6d, 0x6f, 0x6b, 0x65, // object 1 = "smoke"
          ];
          const pdu = [
            0x2b,
            0x0e,
            readCode,
            0x01, // conformity level
            0x00, // more follows: false
            0x00, // next object id
            0x02, // number of objects
            ...objects,
          ];
          return buildTcpAdu(txHi, txLo, prHi, prLo, unit, pdu);
        }
        default:
          return exception(txHi, txLo, prHi, prLo, unit, fc, 0x01);
      }
    };

    let rxPump = null;
    let rxCarry = new Uint8Array(0);

    const concatU8 = (a, b) => {
      if (!a.length) return b;
      if (!b.length) return a;
      const out = new Uint8Array(a.length + b.length);
      out.set(a, 0);
      out.set(b, a.length);
      return out;
    };

    const splitTcpAdus = (buffer) => {
      const frames = [];
      let offset = 0;

      while (buffer.length - offset >= 7) {
        const mbapLen = u16(buffer[offset + 4], buffer[offset + 5]);
        const totalLen = 6 + mbapLen;
        if (mbapLen < 2) {
          // Invalid MBAP length (must include unit + at least FC byte).
          offset += 1;
          continue;
        }
        if (buffer.length - offset < totalLen) {
          break;
        }
        frames.push(buffer.slice(offset, offset + totalLen));
        offset += totalLen;
      }

      return { frames, rest: buffer.slice(offset) };
    };

    const startRxPump = () => {
      if (!server || rxPump) return;
      rxPump = setInterval(() => {
        try {
          const chunk = toU8(server.recv_frame());
          if (!chunk.length) return;

          rxCarry = concatU8(rxCarry, chunk);
          const parsed = splitTcpAdus(rxCarry);
          rxCarry = parsed.rest;

          for (const frame of parsed.frames) {
            let response;
            try {
              response = buildAutoResponse(frame);
            } catch (err) {
              log(`pump decode error: ${String(err)}`);
              continue;
            }
            server.send_frame(response);
            log(`pump handled fc=${frame[7]} req=${frame.length}B rsp=${response.length}B`);
          }
        } catch (_err) {
          // No frame ready: recv_frame may throw timeout-style errors; ignore quietly.
        }
      }, 30);
      log("auto responder pump started");
    };

    const stopRxPump = () => {
      if (rxPump) {
        clearInterval(rxPump);
        rxPump = null;
        rxCarry = new Uint8Array(0);
        log("auto responder pump stopped");
      }
    };

    let server = null;

    await init();
    log("WASM initialized.");

    const ensureServer = () => {
      if (!server) {
        log("Server not created. Click Create Server first.");
        return false;
      }
      return true;
    };

    document.getElementById("btnClear").addEventListener("click", () => {
      logEl.textContent = "";
    });

    document.getElementById("btnCreate").addEventListener("click", () => {
      try {
        const wsUrl = document.getElementById("wsUrl").value.trim();
        const cfg = new WasmTcpGatewayConfig(wsUrl);

        const onRequest = (req) => {
          const response = {
            ok: true,
            received: req,
            at: new Date().toISOString(),
          };
          return Promise.resolve(response);
        };

        server = new WasmTcpServer(cfg, onRequest);
        log(`Server created. ws_url=${server.ws_url()}`);
      } catch (err) {
        log(`Create ERROR: ${String(err)}`);
      }
    });

    document.getElementById("btnStart").addEventListener("click", () => {
      if (!ensureServer()) return;
      try {
        server.start();
        log("start() OK");
      } catch (err) {
        log(`start() ERROR: ${String(err)}`);
      }
    });

    document.getElementById("btnStop").addEventListener("click", () => {
      if (!ensureServer()) return;
      try {
        server.stop();
        log("stop() OK");
      } catch (err) {
        log(`stop() ERROR: ${String(err)}`);
      }
    });

    document.getElementById("btnStatus").addEventListener("click", () => {
      if (!ensureServer()) return;
      log(`is_running=${server.is_running()} transport_connected=${server.transport_connected()}`);
    });

    document.getElementById("btnDispatch").addEventListener("click", async () => {
      if (!ensureServer()) return;
      try {
        const req = parseJson(document.getElementById("requestJson").value);
        const out = await server.dispatch_request(req);
        log(`dispatch_request OK: ${formatValue(out)}`);
      } catch (err) {
        log(`dispatch_request ERROR: ${String(err)}`);
      }
    });

    document.getElementById("btnSend").addEventListener("click", () => {
      if (!ensureServer()) return;
      try {
        const bytes = hexToBytes(document.getElementById("frameHex").value);
        server.send_frame(bytes);
        log(`send_frame OK (${bytes.length} bytes)`);
      } catch (err) {
        log(`send_frame ERROR: ${String(err)}`);
      }
    });

    document.getElementById("btnRecv").addEventListener("click", () => {
      if (!ensureServer()) return;
      try {
        const out = server.recv_frame();
        log(`recv_frame OK: ${formatValue(out)}`);
      } catch (err) {
        log(`recv_frame ERROR: ${String(err)}`);
      }
    });

    document.getElementById("btnRunAll").addEventListener("click", async () => {
      if (!ensureServer()) return;
      const req = parseJson(document.getElementById("requestJson").value);
      const steps = [
        ["status-before", async () => `running=${server.is_running()} connected=${server.transport_connected()}`],
        ["start", async () => { server.start(); return "ok"; }],
        ["status-after-start", async () => `running=${server.is_running()} connected=${server.transport_connected()}`],
        ["dispatch_request", async () => server.dispatch_request(req)],
        ["send_frame", async () => {
          const bytes = hexToBytes(document.getElementById("frameHex").value);
          server.send_frame(bytes);
          return `sent ${bytes.length} bytes`;
        }],
        ["recv_frame", async () => server.recv_frame()],
        ["stop", async () => { server.stop(); return "ok"; }],
        ["status-after-stop", async () => `running=${server.is_running()} connected=${server.transport_connected()}`],
      ];

      log("Running TCP server smoke...");
      for (const [name, run] of steps) {
        try {
          const out = await run();
          log(`OK   ${name}: ${formatValue(out)}`);
        } catch (err) {
          log(`SKIP ${name}: ${String(err)}`);
        }
        await sleep(350);
      }
      log("TCP server smoke complete.");
    });
  </script>
</body>
</html>
