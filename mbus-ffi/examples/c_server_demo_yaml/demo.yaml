name: c_server_demo_yaml
description: "YAML-driven Modbus TCP server with generated handler table"
binary: c_server_demo_yaml
rust_features: "c-server,full"

codegen:
  config: mbus-ffi/examples/c_server_demo_yaml/mbus_server_app.example.yaml
  header: mbus-ffi/include/mbus_server_app.h

run:
  default_mode: server
  modes:
    server:
      args: []
      description: "Real Modbus TCP server on port 5020 (Ctrl-C to stop)"
    self-test:
      args: ["--self-test"]
      description: "In-process test, no network needed"
