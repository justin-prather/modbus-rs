<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mbus-ffi Web Serial Full Smoke</title>
  <style>
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.4;
      background: #444;
      color: #eee;
    }
    .row { margin: 0.6rem 0; }
    label { display: inline-block; min-width: 220px; }
    input, select {
      width: 260px;
      max-width: 100%;
      padding: 0.35rem;
      background: #5a5a5a;
      color: #eee;
      border: 1px solid #888;
    }
    button {
      margin-right: 0.5rem;
      margin-bottom: 0.4rem;
      padding: 0.45rem 0.8rem;
      background: #5a6a7a;
      color: #eee;
      border: 1px solid #aaa;
      cursor: pointer;
    }
    pre {
      border: 1px solid #666;
      border-radius: 6px;
      background: #333;
      padding: 0.8rem;
      min-height: 220px;
      white-space: pre-wrap;
    }
    .hint { color: #bbb; }
  </style>
</head>
<body>
  <h1>mbus-ffi Web Serial Full Smoke</h1>

  <p class="hint">
    Requires Chromium-based browser + HTTPS/localhost + user gesture for port selection.
  </p>
  <p class="hint">
    This runner executes all exposed serial WASM methods from base address 0 unless overridden below.
  </p>

  <div class="row"><label for="unitId">Unit ID</label><input id="unitId" type="number" value="1" min="1" max="247" /></div>
  <div class="row"><label for="mode">Mode</label><select id="mode"><option value="rtu">RTU</option><option value="ascii">ASCII</option></select></div>
  <div class="row"><label for="baud">Baud Rate</label><input id="baud" type="number" value="9600" min="300" /></div>
  <div class="row"><label for="dataBits">Data Bits</label><input id="dataBits" type="number" value="8" min="5" max="8" /></div>
  <div class="row"><label for="stopBits">Stop Bits</label><input id="stopBits" type="number" value="1" min="1" max="2" /></div>
  <div class="row"><label for="parity">Parity</label><select id="parity"><option value="none">none</option><option value="even" selected>even</option><option value="odd">odd</option></select></div>
  <div class="row"><label for="timeout">Response Timeout (ms)</label><input id="timeout" type="number" value="3000" min="1" /></div>
  <div class="row"><label for="retries">Retry Attempts</label><input id="retries" type="number" value="1" min="0" /></div>
  <div class="row"><label for="tick">Tick Interval (ms)</label><input id="tick" type="number" value="20" min="1" /></div>
  <div class="row"><label for="baseAddr">Base Address</label><input id="baseAddr" type="number" value="0" min="0" max="65535" /></div>
  <div class="row"><label for="regQty">Register Quantity</label><input id="regQty" type="number" value="2" min="1" max="125" /></div>
  <div class="row"><label for="bitQty">Bit Quantity</label><input id="bitQty" type="number" value="8" min="1" max="2000" /></div>

  <div class="row">
    <button id="btnRequestPort">Request Serial Port</button>
    <button id="btnConnect">Create Serial Client</button>
    <button id="btnStatus">Connection Status</button>
    <button id="btnRunAll">Run All Serial Tests</button>
    <button id="btnClearLog">Clear Log</button>
  </div>

  <h3>Log</h3>
  <pre id="log"></pre>

  <script type="module">
    import init, { request_serial_port, WasmSerialModbusClient } from "../../pkg/mbus_ffi.js";

    const logEl = document.getElementById("log");
    const log = (msg) => {
      const ts = new Date().toISOString().slice(11, 23);
      logEl.textContent += `[${ts}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    };

    const num = (id) => Number(document.getElementById(id).value);
    const str = (id) => document.getElementById(id).value;
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const formatValue = (value) => {
      if (value == null) return String(value);
      if (ArrayBuffer.isView(value)) return JSON.stringify(Array.from(value));
      if (Array.isArray(value)) {
        return JSON.stringify(value.map((entry) => {
          if (entry && typeof entry === "object") {
            const normalized = { ...entry };
            if (normalized.data && ArrayBuffer.isView(normalized.data)) {
              normalized.data = Array.from(normalized.data);
            }
            return normalized;
          }
          return entry;
        }));
      }
      if (typeof value === "object") return JSON.stringify(value);
      return String(value);
    };

    const classifyError = (err) => {
      const text = String(err);
      if (text.includes("StepTimeout(")) {
        return { level: "SKIP", detail: `${text} (no response from target; likely unsupported function or serial settings mismatch)` };
      }
      if (text.includes("ModbusException(1)")) {
        return { level: "SKIP", detail: `${text} (function unsupported by target device)` };
      }
      if (text.includes("ModbusException(6)")) {
        return { level: "SKIP", detail: `${text} (device busy)` };
      }
      return { level: "FAIL", detail: text };
    };

    const withBusyRetry = async (name, run, retries = 1) => {
      try {
        return await run();
      } catch (err) {
        const text = String(err);
        if (retries > 0 && text.includes("ModbusException(6)")) {
          log(`RETRY ${name}: ${text} -> waiting and retrying once`);
          await sleep(700);
          return withBusyRetry(name, run, retries - 1);
        }
        throw err;
      }
    };

    const withStepTimeout = async (name, run) => {
      const timeoutMs = Math.max(1500, (num("timeout") * (num("retries") + 1)) + 1200);
      return Promise.race([
        run(),
        new Promise((_, reject) => {
          setTimeout(() => reject(new Error(`StepTimeout(${timeoutMs}ms) in ${name}`)), timeoutMs);
        }),
      ]);
    };

    let portHandle = null;
    let client = null;

    await init();
    log("WASM initialized.");

    document.getElementById("btnClearLog").addEventListener("click", () => {
      logEl.textContent = "";
    });

    document.getElementById("btnRequestPort").addEventListener("click", async () => {
      try {
        portHandle = await request_serial_port();
        log(`Serial port granted. valid=${portHandle.is_valid()}`);
      } catch (err) {
        log(`request_serial_port ERROR: ${String(err)}`);
      }
    });

    document.getElementById("btnConnect").addEventListener("click", () => {
      if (!portHandle) {
        log("No port selected. Click Request Serial Port first.");
        return;
      }
      try {
        client = new WasmSerialModbusClient(
          portHandle,
          num("unitId"),
          str("mode"),
          num("baud"),
          num("dataBits"),
          num("stopBits"),
          str("parity"),
          num("timeout"),
          num("retries"),
          num("tick"),
        );
        log("WasmSerialModbusClient created.");
      } catch (err) {
        log(`Create client ERROR: ${String(err)}`);
      }
    });

    document.getElementById("btnStatus").addEventListener("click", () => {
      if (!client) {
        log("Client not initialized.");
        return;
      }
      log(`is_connected = ${client.is_connected()}, has_pending_requests = ${client.has_pending_requests()}`);
    });

    document.getElementById("btnRunAll").addEventListener("click", async () => {
      if (!client) {
        log("Client not initialized. Click Create Serial Client first.");
        return;
      }

      const base = num("baseAddr");
      const regQty = num("regQty");
      const bitQty = num("bitQty");

      const steps = [
        ["is_connected", async () => client.is_connected()],

        ["read_coils", async () => client.read_coils(base, bitQty)],
        ["read_single_coil", async () => client.read_single_coil(base)],
        ["write_single_coil", async () => client.write_single_coil(base, true)],
        ["write_multiple_coils", async () => {
          const bytes = Math.max(1, Math.ceil(bitQty / 8));
          return client.write_multiple_coils(base, bitQty, new Uint8Array(bytes).fill(0xAA));
        }],

        ["read_discrete_inputs", async () => client.read_discrete_inputs(base, bitQty)],
        ["read_single_discrete_input", async () => client.read_single_discrete_input(base)],

        ["read_holding_registers", async () => client.read_holding_registers(base, regQty)],
        ["read_single_holding_register", async () => client.read_single_holding_register(base)],
        ["write_single_register", async () => client.write_single_register(base, 1)],
        ["write_multiple_registers", async () => {
          const vals = Array.from({ length: regQty }, (_, i) => i + 1);
          return client.write_multiple_registers(base, regQty, new Uint16Array(vals));
        }],
        ["read_write_multiple_registers", async () => {
          const vals = Array.from({ length: regQty }, (_, i) => i + 10);
          return client.read_write_multiple_registers(base, regQty, base, regQty, new Uint16Array(vals));
        }],
        ["mask_write_register", async () => client.mask_write_register(base, 0xFFFF, 0x0001)],

        ["read_input_registers", async () => withBusyRetry("read_input_registers", () => client.read_input_registers(base, regQty), 2)],
        ["read_single_input_register", async () => withBusyRetry("read_single_input_register", () => client.read_single_input_register(base), 2)],

        ["read_fifo_queue", async () => client.read_fifo_queue(base)],

        ["read_file_record", async () => client.read_file_record(1, 0, 1)],
        ["write_file_record", async () => client.write_file_record(1, 0, new Uint16Array([1]))],

        ["read_exception_status", async () => client.read_exception_status()],
        ["diagnostics", async () => client.diagnostics(0, new Uint16Array([0]))],
        ["get_comm_event_counter", async () => client.get_comm_event_counter()],
        ["get_comm_event_log", async () => client.get_comm_event_log()],
        ["report_server_id", async () => client.report_server_id()],
        ["read_device_identification", async () => client.read_device_identification(1, 0)],
      ];

      log(`Running full serial smoke from base=${base}, regQty=${regQty}, bitQty=${bitQty} ...`);
      for (const [name, run] of steps) {
        try {
          log(`RUN  ${name} ...`);
          const result = await withStepTimeout(name, run);
          log(`OK   ${name}: ${formatValue(result)}`);
        } catch (err) {
          const classified = classifyError(err);
          log(`${classified.level} ${name}: ${classified.detail}`);
        }
        await sleep(450);
      }
      log("Full serial smoke run complete.");
    });
  </script>
</body>
</html>
