name: CI

on:
  push:
    branches: ["main", "develop", "release/**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel in-flight runs for the same ref on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Feature-subset matrix (check + clippy) ─────────────────────────────
  feature-subsets:
    name: Feature subsets (check + clippy) (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Run feature-subset matrix (fast — check + clippy only)
        run: cargo run -p xtask -- check-feature-subsets --fast

  # ── 2. Full workspace check + clippy ─────────────────────────────────────
  clippy-all:
    name: Clippy (all features) (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Clippy — workspace, all targets, all features
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── 3. Tests (workspace) ─────────────────────────────────────────────────
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Run workspace tests (all features)
        # TRYBUILD=overwrite prevents trybuild snapshot tests from failing due to
        # compiler error-message wording that changes between Rust releases.
        # Snapshots are maintained locally; CI just verifies code compiles/fails as expected.
        env:
          TRYBUILD: overwrite
        # Exclude mbus-ffi: its C-FFI layer requires consumer-supplied extern symbols
        # (mbus_app_lock, app_on_write_*, etc.) that aren't present in test binaries.
        # On Linux/macOS the dynamic linker allows lazy binding; MSVC's link.exe does not.
        # mbus-ffi is exercised by the dedicated c-ffi and python jobs (Linux only).
        run: cargo test --workspace --all-features --exclude mbus-ffi

  # ── 4. Feature-subset build + integration tests ───────────────────────────
  feature-subsets-full:
    name: Feature subsets (build + test)
    runs-on: ubuntu-latest
    # Only on main / release pushes — too slow for every PR.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Run feature-subset matrix (full — includes build + test)
        run: cargo run -p xtask -- check-feature-subsets

  # ── 5. no_std targets ─────────────────────────────────────────────────────
  no-std:
    name: no_std (thumbv7em)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + thumbv7em target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Check mbus-core (coils+registers, no_std)
        run: cargo check -p mbus-core --no-default-features --features coils,registers --target thumbv7em-none-eabihf

      - name: Check mbus-client (coils+registers, no_std)
        run: cargo check -p mbus-client --no-default-features --features coils,registers --target thumbv7em-none-eabihf

      - name: Check mbus-server (coils+holding-registers, no_std)
        run: cargo check -p mbus-server --no-default-features --features coils,holding-registers --target thumbv7em-none-eabihf

      - name: Check mbus-gateway (no features, no_std)
        run: cargo check -p mbus-gateway --no-default-features --target thumbv7em-none-eabihf

  # ── 6. WASM ───────────────────────────────────────────────────────────────
  wasm:
    name: WASM (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Check mbus-ffi WASM bindings
        run: cargo check -p mbus-ffi --target wasm32-unknown-unknown --features wasm,full

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run WASM server binding tests (Node)
        run: wasm-pack test --node --features wasm,full --test wasm_server_bindings
        working-directory: mbus-ffi

  # ── 7. Python bindings ────────────────────────────────────────────────────
  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin + test dependencies
        run: pip install maturin pytest pytest-asyncio

      - name: Build Python wheel
        run: maturin build --features python,full
        working-directory: mbus-ffi

      - name: Install built wheel
        run: pip install $(find mbus-ffi/target/wheels -name '*.whl' | head -1)

      - name: Run Python tests
        run: pytest

  # ── 8. C FFI headers + demo ───────────────────────────────────────────────
  c-ffi:
    name: C FFI (headers + demo build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libudev-dev cmake gcc

      - name: Check C FFI feature slices
        run: |
          cargo check -p mbus-ffi --no-default-features --features c,full
          cargo check -p mbus-ffi --no-default-features --features c,c-server,server-traffic,full
          cargo check -p mbus-ffi --no-default-features --features c,c-gateway,full

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Check C headers are up to date
        run: cargo run -p xtask -- check-header

      - name: Build C client demo
        run: cargo run -p xtask -- build-c-demo --demo c_client_demo

      - name: Build C server demo
        run: cargo run -p xtask -- build-c-demo --demo c_server_demo

  # ── 9. Docs validation ────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Validate doc links
        run: cargo run -p xtask -- check-doc-links

      - name: Validate docs content
        run: cargo run -p xtask -- validate-docs

      - name: Build rustdoc (all features, deny warnings)
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
