name: Node.js bindings

on:
  push:
    branches: [main]
    paths:
      - 'mbus-ffi/**'
      - '!mbus-ffi/dotnet/**'
      - '!mbus-ffi/python/**'
      - '!mbus-ffi/go/**'
      - '!mbus-ffi/examples/c_*/**'
      - 'mbus-core/**'
      - 'mbus-async/**'
      - 'mbus-client-async/**'
      - 'mbus-server-async/**'
      - 'mbus-gateway/**'
      - 'mbus-network/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/nodejs-bindings.yml'
  pull_request:
    paths:
      - 'mbus-ffi/**'
      - '!mbus-ffi/dotnet/**'
      - '!mbus-ffi/python/**'
      - '!mbus-ffi/go/**'
      - '!mbus-ffi/examples/c_*/**'
      - 'mbus-core/**'
      - 'mbus-async/**'
      - 'mbus-client-async/**'
      - 'mbus-server-async/**'
      - 'mbus-gateway/**'
      - 'mbus-network/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/nodejs-bindings.yml'

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  check:
    name: Check Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nodejs-check

      # serialport requires libudev on Linux
      - name: Install libudev (Linux)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libudev-dev

      - name: cargo check (nodejs feature)
        run: cargo check -p mbus-ffi --features nodejs

      - name: cargo clippy (nodejs feature)
        run: cargo clippy -p mbus-ffi --features nodejs -- -D warnings

  build:
    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            setup: sudo apt-get update -qq && sudo apt-get install -y musl-tools
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y gcc-arm-linux-gnueabihf
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nodejs-build-${{ matrix.settings.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mbus-ffi/nodejs
        run: npm install

      - name: Additional setup
        if: matrix.settings.setup
        run: ${{ matrix.settings.setup }}

      # serialport requires libudev on Linux
      - name: Install libudev (Linux)
        if: runner.os == 'Linux' && matrix.settings.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libudev-dev

      - name: Build native module
        working-directory: mbus-ffi/nodejs
        run: npx napi build --platform --release --target ${{ matrix.settings.target }} --cargo-flags="--features nodejs"
        shell: bash
        env:
          CARGO_BUILD_TARGET: ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: mbus-ffi/nodejs/*.node
          if-no-files-found: error

  test:
    name: Test - ${{ matrix.os }} - Node.js ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: mbus-ffi/nodejs/artifacts

      - name: Move artifacts
        working-directory: mbus-ffi/nodejs
        shell: bash
        run: |
          for dir in artifacts/bindings-*; do
            cp "$dir"/*.node . 2>/dev/null || true
          done

      - name: Install dependencies
        working-directory: mbus-ffi/nodejs
        run: npm install

      - name: Test imports
        working-directory: mbus-ffi/nodejs
        run: node -e "const m = require('.'); console.log('Loaded:', Object.keys(m))"

