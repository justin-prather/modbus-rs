name: Release Node.js (npm)

# Trigger: push a tag of the form `nodejs-v*` (e.g. `nodejs-v0.9.0`).
# Run manually via workflow_dispatch for testing.
on:
  push:
    tags:
      - "nodejs-v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: sudo apt-get update -qq && sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nodejs-release-${{ matrix.settings.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mbus-ffi/nodejs
        run: npm install

      - name: Additional setup
        if: matrix.settings.setup
        run: ${{ matrix.settings.setup }}

      - name: Configure aarch64 linker
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build native module
        working-directory: mbus-ffi/nodejs
        shell: bash
        run: npx napi build --platform --release --target ${{ matrix.settings.target }} --features nodejs,full --manifest-path ../Cargo.toml --js index.js --dts index.d.ts --output-dir .
        env:
          CARGO_BUILD_TARGET: ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: mbus-ffi/nodejs/**/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: mbus-ffi/nodejs
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: mbus-ffi/nodejs/artifacts

      - name: Prepare npm artifacts
        working-directory: mbus-ffi/nodejs
        shell: bash
        run: |
          for dir in artifacts/bindings-*; do
            cp "$dir"/*.node . 2>/dev/null || true
          done
          npm run prepublishOnly

      - name: Publish platform packages
        working-directory: mbus-ffi/nodejs
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg_dir in npm/*; do
            if [ -d "$pkg_dir" ]; then
              echo "Publishing $pkg_dir"
              (cd "$pkg_dir" && npm publish --access public)
            fi
          done

      - name: Publish main package
        working-directory: mbus-ffi/nodejs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
