name: Release Node.js (npm)

# Trigger: push a tag of the form `nodejs-v*` (e.g. `nodejs-v0.9.0`).
# Run manually via workflow_dispatch for testing.
on:
  push:
    tags:
      - "nodejs-v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: sudo apt-get update -qq && sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nodejs-release-${{ matrix.settings.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0

      - name: Install dependencies
        working-directory: mbus-ffi/nodejs
        run: npm install

      - name: Additional setup
        if: matrix.settings.setup
        run: ${{ matrix.settings.setup }}

      - name: Configure aarch64 linker
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build native module
        working-directory: mbus-ffi/nodejs
        shell: bash
        run: npx napi build --platform --release --target ${{ matrix.settings.target }} --features nodejs,coils,registers,discrete-inputs,fifo,file-record,diagnostics,traffic,error-trait --manifest-path ../Cargo.toml --js index.js --dts index.d.ts --output-dir .
        env:
          CARGO_BUILD_TARGET: ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: mbus-ffi/nodejs/**/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: mbus-ffi/nodejs
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: mbus-ffi/nodejs/artifacts

      - name: Stage platform binaries
        working-directory: mbus-ffi/nodejs
        shell: bash
        run: |
          shopt -s nullglob
          for dir in artifacts/bindings-*; do
            for bin in "$dir"/*.node; do
              target_file=$(basename "$bin")
              case "$target_file" in
                modbus-rs.win32-x64-msvc.node)
                  cp "$bin" npm/win32-x64-msvc/
                  ;;
                modbus-rs.linux-x64-gnu.node)
                  cp "$bin" npm/linux-x64-gnu/
                  ;;
                modbus-rs.darwin-x64.node)
                  cp "$bin" npm/darwin-x64/
                  ;;
                modbus-rs.darwin-arm64.node)
                  cp "$bin" npm/darwin-arm64/
                  ;;
                modbus-rs.linux-arm64-gnu.node)
                  cp "$bin" npm/linux-arm64-gnu/
                  ;;
                *)
                  echo "Unexpected binary artifact: $target_file"
                  exit 1
                  ;;
              esac
            done
          done

          for pkg_dir in npm/*; do
            if [ -d "$pkg_dir" ]; then
              ls -la "$pkg_dir"
            fi
          done

      - name: Publish platform packages
        working-directory: mbus-ffi/nodejs
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          published_version() {
            npm view "$1@$2" version 2>/dev/null || true
          }

          for pkg_dir in npm/*; do
            if [ -d "$pkg_dir" ]; then
              pkg_name=$(npm pkg get name --prefix "$pkg_dir" | tr -d '"')
              pkg_version=$(npm pkg get version --prefix "$pkg_dir" | tr -d '"')

              if [ "$(published_version "$pkg_name" "$pkg_version")" = "$pkg_version" ]; then
                echo "Skipping $pkg_name@$pkg_version (already published)"
                continue
              fi

              echo "Publishing $pkg_name@$pkg_version from $pkg_dir"
              (cd "$pkg_dir" && npm publish --access public)
            fi
          done

      - name: Publish main package
        working-directory: mbus-ffi/nodejs
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pkg_name=$(npm pkg get name | tr -d '"')
          pkg_version=$(npm pkg get version | tr -d '"')

          if [ "$(npm view "$pkg_name@$pkg_version" version 2>/dev/null || true)" = "$pkg_version" ]; then
            echo "Skipping $pkg_name@$pkg_version (already published)"
            exit 0
          fi

          npm publish --access public --ignore-scripts
