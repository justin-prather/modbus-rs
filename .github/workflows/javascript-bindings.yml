name: Node.js bindings

on:
  push:
    branches: [main]
    paths:
      - 'mbus-ffi/**'
      - '!mbus-ffi/dotnet/**'
      - '!mbus-ffi/python/**'
      - '!mbus-ffi/go/**'
      - '!mbus-ffi/examples/c_*/**'
      - 'mbus-core/**'
      - 'mbus-async/**'
      - 'mbus-client-async/**'
      - 'mbus-server-async/**'
      - 'mbus-gateway/**'
      - 'mbus-network/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/javascript-bindings.yml'
  pull_request:
    paths:
      - 'mbus-ffi/**'
      - '!mbus-ffi/dotnet/**'
      - '!mbus-ffi/python/**'
      - '!mbus-ffi/go/**'
      - '!mbus-ffi/examples/c_*/**'
      - 'mbus-core/**'
      - 'mbus-async/**'
      - 'mbus-client-async/**'
      - 'mbus-server-async/**'
      - 'mbus-gateway/**'
      - 'mbus-network/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/javascript-bindings.yml'
  workflow_dispatch:

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  check:
    name: Check Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nodejs-check-v2
          cache-bin: false

      - name: cargo check (nodejs feature)
        run: cargo check -p mbus-ffi --features nodejs-full

      - name: cargo clippy (nodejs feature)
        run: cargo clippy -p mbus-ffi --features nodejs-full -- -D warnings

  build:
    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: sudo apt-get update -qq && sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nodejs-build-v2-${{ matrix.settings.target }}
          cache-bin: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.16.0

      - name: Install dependencies
        working-directory: mbus-ffi/javascript
        run: npm install

      - name: Additional setup
        if: matrix.settings.setup
        run: ${{ matrix.settings.setup }}

      - name: Configure aarch64 linker
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build native module
        working-directory: mbus-ffi/javascript
        run: npx napi build --platform --release --target ${{ matrix.settings.target }} --features nodejs-full --manifest-path ../Cargo.toml --js index.js --dts index.d.ts --output-dir dist && node scripts/postbuild.js
        shell: bash
        env:
          CARGO_BUILD_TARGET: ${{ matrix.settings.target }}

      - name: List built native artifacts
        shell: bash
        run: |
          find mbus-ffi/javascript -maxdepth 4 -name '*.node' -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: mbus-ffi/javascript/**/*.node
          if-no-files-found: error

  test:
    name: Test - ${{ matrix.os }} - Node.js ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['24.16.0']
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: mbus-ffi/javascript/artifacts

      - name: Move artifacts
        working-directory: mbus-ffi/javascript
        shell: bash
        run: |
          mkdir -p dist
          find artifacts/ -name '*.node' -exec cp {} dist/ \;

      - name: Install dependencies
        working-directory: mbus-ffi/javascript
        run: npm install

      - name: Test imports
        working-directory: mbus-ffi/javascript
        run: node -e "const m = require('.'); console.log('Loaded:', Object.keys(m))"

      - name: Run npm tests
        working-directory: mbus-ffi/javascript
        run: npm test

  # publish job lives in .github/workflows/release-javascript-npm.yml
  # trigger: git tag nodejs-v*

  test-wasm:
    name: WASM (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-bindings-v2
          cache-bin: false

      - name: Check mbus-ffi WASM bindings
        run: cargo check -p mbus-ffi --target wasm32-unknown-unknown --features wasm-full

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run WASM server binding tests (Node)
        run: wasm-pack test --node --features wasm-full --test wasm_server_bindings
        working-directory: mbus-ffi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.16.0
          cache: 'npm'
          cache-dependency-path: mbus-ffi/javascript/package-lock.json

      - name: Install dependencies
        working-directory: mbus-ffi/javascript
        run: npm ci

      - name: Build and Verify WASM package
        working-directory: mbus-ffi/javascript
        run: |
          npm run build:wasm
          rm -rf node_modules/modbus-rs-wasm
          ln -s ../dist/npm/wasm node_modules/modbus-rs-wasm

      - name: Install Playwright Chromium
        working-directory: mbus-ffi/javascript
        run: npx playwright install --with-deps chromium

      - name: Run WASM browser E2E tests (Playwright + Vitest)
        working-directory: mbus-ffi/javascript
        run: npm run test:wasm
